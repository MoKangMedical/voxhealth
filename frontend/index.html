<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VoxHealth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#e5e5e5;--dim:#888;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
.page{display:none;padding:16px;min-height:100vh}.page.active{display:block}
.header{text-align:center;padding:24px 0 16px}.header h1{font-size:28px;font-weight:700}.header p{color:var(--dim);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:active{opacity:.8}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.record-btn{width:80px;height:80px;border-radius:50%;border:3px solid var(--red);background:transparent;display:flex;align-items:center;justify-content:center;margin:20px auto;transition:all .3s}
.record-btn .dot{width:28px;height:28px;border-radius:50%;background:var(--red);transition:all .3s}
.record-btn.recording{border-color:#fff;animation:pulse 1.5s infinite}
.record-btn.recording .dot{border-radius:4px;width:24px;height:24px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 20px rgba(239,68,68,0)}}
.timer{font-size:32px;font-weight:300;font-family:monospace;text-align:center;margin:12px 0;color:var(--dim)}
.wave-bar{width:100%;height:64px;background:rgba(0,0,0,.3);border-radius:12px;overflow:hidden;display:flex;align-items:end;gap:2px;padding:4px}
.wave-bar span{flex:1;background:var(--blue);border-radius:2px;min-height:2px;transition:height .05s}
.score-circle{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px;border:3px solid}
.score-circle.good{border-color:var(--green)}.score-circle.warn{border-color:var(--yellow)}.score-circle.bad{border-color:var(--red)}
.score-circle .num{font-size:32px;font-weight:700}.score-circle .label{font-size:10px;color:var(--dim)}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;margin:2px}
.tag-high{background:rgba(239,68,68,.15);color:var(--red)}
.tag-mid{background:rgba(234,179,8,.15);color:var(--yellow)}
.tag-low{background:rgba(34,197,94,.15);color:var(--green)}
.bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin:6px 0}.bar-fill{height:100%;border-radius:2px;transition:width .6s}
.bar-fill.high{background:var(--red)}.bar-fill.mid{background:var(--yellow)}.bar-fill.low{background:var(--green)}
.disease-card{padding:12px;border-bottom:1px solid var(--border)}.disease-card:last-child{border:none}
.disease-name{font-weight:600;font-size:14px}.disease-score{font-size:20px;font-weight:700}
.disease-cat{font-size:11px;color:var(--dim)}
.marker{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;background:rgba(255,255,255,.05);color:var(--dim);margin:1px}
.rec-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.feat-item{background:rgba(0,0,0,.2);border-radius:8px;padding:8px}.feat-item .k{font-size:10px;color:var(--dim)}.feat-item .v{font-size:13px;font-family:monospace}
.tabs{display:flex;gap:8px;margin:12px 0;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.tab{padding:6px 12px;border-radius:8px;font-size:12px;background:rgba(255,255,255,.05);color:var(--dim);cursor:pointer;border:none;flex-shrink:0}
.tab.active{background:var(--blue);color:#fff}
.loading{text-align:center;padding:40px}.loading .dots{display:flex;justify-content:center;gap:4px;margin-top:12px}
.loading .dots span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:bounce .6s infinite alternate}
.loading .dots span:nth-child(2){animation-delay:.2s}.loading .dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-8px)}}
.text-sm{font-size:12px}.text-xs{font-size:11px;color:var(--dim)}.text-center{text-align:center}.mt-8{margin-top:8px}.mb-12{margin-bottom:12px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom);z-index:100}
.nav-item{flex:1;text-align:center;padding:4px 0;font-size:10px;color:var(--dim);cursor:pointer;transition:color .2s}
.nav-item.active{color:var(--blue)}.nav-item .icon{font-size:20px;margin-bottom:2px}
.pb-80{padding-bottom:80px}
.trend-chart{width:100%;height:200px;position:relative}
.trend-line{fill:none;stroke:var(--blue);stroke-width:2}
.trend-dot{fill:var(--blue)}
.hidden{display:none!important}
</style>
</head>
<body>
<!-- 登录页 -->
<div id="page-login" class="page active">
<div class="header"><h1>VoxHealth</h1><p>30秒语音 · 健康早筛</p></div>
<div class="card" style="margin-top:40px">
<p class="text-sm mb-12" style="text-align:center">输入手机号开始使用</p>
<input id="phone-input" type="tel" placeholder="手机号" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:#fff;font-size:16px;margin-bottom:12px">
<button class="btn btn-primary" onclick="doLogin()">开始使用</button>
</div>
<p class="text-xs text-center" style="margin-top:20px">隐私优先 · 音频分析后即删</p>
</div>

<!-- 首页 -->
<div id="page-home" class="page">
<div class="header"><h1>VoxHealth</h1><p>你好，<span id="user-name">用户</span></p></div>
<div class="card text-center" style="padding:24px">
<p class="text-sm" style="margin-bottom:12px">点击开始30秒语音健康检测</p>
<button class="btn btn-primary mt-8" onclick="startRecord()">🎤 开始检测</button>
</div>
<div class="card"><p class="text-sm" style="font-weight:600;margin-bottom:8px">📊 最近检测</p><div id="recent-list"><p class="text-xs">暂无记录</p></div></div>
</div>

<!-- 录音页 -->
<div id="page-record" class="page">
<div class="header"><h1>🎤 语音检测</h1><p>请自然说话30秒</p></div>
<div class="timer" id="timer">00:30</div>
<button class="record-btn" id="record-btn" onclick="toggleRecord()"><div class="dot"></div></button>
<p class="text-xs text-center mt-8">支持中文/英文/任何语言</p>
</div>

<!-- 分析中 -->
<div id="page-loading" class="page">
<div class="loading" style="padding-top:100px">
<div style="font-size:48px;margin-bottom:16px">🧠</div>
<p>AI正在分析你的语音...</p>
<div class="dots"><span></span><span></span><span></span></div>
</div>
</div>

<!-- 报告页 -->
<div id="page-report" class="page pb-80">
<div class="header"><h1>📋 健康报告</h1><p id="report-time"></p></div>
<div class="card text-center" id="report-summary"></div>
<div class="card"><p class="text-sm" style="font-weight:600;margin-bottom:8px">🎙️ 声学特征</p><div class="feat-grid" id="feat-grid"></div></div>
<div class="card"><p class="text-sm" style="font-weight:600;margin-bottom:8px">🤖 AI健康解读</p><p id="ai-insight" class="text-sm" style="line-height:1.6"></p></div>
<div class="card"><p class="text-sm" style="font-weight:600;margin-bottom:8px">🏥 疾病风险筛查</p><div class="tabs" id="disease-tabs"></div><div id="disease-list"></div></div>
<div class="card"><p class="text-sm" style="font-weight:600;margin-bottom:8px">💡 建议</p><div id="rec-list"></div></div>
<div style="padding:16px"><button class="btn btn-outline" onclick="showPage('page-home')">返回首页</button></div>
</div>

<!-- 历史页 -->
<div id="page-history" class="page pb-80">
<div class="header"><h1>📊 检测历史</h1><p>查看所有记录</p></div>
<div id="history-list"></div>
</div>

<!-- 我的页 -->
<div id="page-profile" class="page pb-80">
<div class="header"><h1>👤 我的</h1></div>
<div class="card">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
<div style="width:48px;height:48px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px">👤</div>
<div><p id="profile-name" style="font-weight:600"></p><p id="profile-phone" class="text-xs"></p></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
<div><p id="stat-total" style="font-size:24px;font-weight:700">0</p><p class="text-xs">检测次数</p></div>
<div><p id="stat-avg" style="font-size:24px;font-weight:700">-</p><p class="text-xs">平均分</p></div>
<div><p id="stat-last" style="font-size:24px;font-weight:700">-</p><p class="text-xs">上次检测</p></div>
</div>
</div>
<div class="card"><button class="btn btn-outline" onclick="logout()">退出登录</button></div>
</div>

<!-- 底部导航 -->
<div class="nav" id="bottom-nav" style="display:none">
<div class="nav-item active" onclick="navTo('home')"><div class="icon">🏠</div>首页</div>
<div class="nav-item" onclick="navTo('history')"><div class="icon">📊</div>历史</div>
<div class="nav-item" onclick="navTo('profile')"><div class="icon">👤</div>我的</div>
</div>
<script>
let userId=localStorage.getItem("vox_uid");
let userName=localStorage.getItem("vox_name")||"用户";
let mediaRecorder=null,audioChunks=[],isRecording=false,timerInterval=null,timeLeft=30;
const API="/api/v1";
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
const nav=document.getElementById("bottom-nav");
nav.style.display=(id=="page-login"||id=="page-loading"||id=="page-record")?"none":"flex";
}
function navTo(page){showPage("page-"+page);if(page=="history")loadHistory();if(page=="profile")loadProfile();if(page=="home")loadRecent();}
async function doLogin(){
const phone=document.getElementById("phone-input").value.trim();
if(!phone)return alert("请输入手机号");
try{const r=await fetch(API+"/user/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone})});
const d=await r.json();userId=d.user.id;userName=d.user.nickname;
localStorage.setItem("vox_uid",userId);localStorage.setItem("vox_name",userName);
document.getElementById("user-name").textContent=userName;showPage("page-home");loadRecent();
}catch(e){alert("网络错误，请重试");}}
function logout(){localStorage.removeItem("vox_uid");localStorage.removeItem("vox_name");userId=null;showPage("page-login");}
async function startRecord(){showPage("page-record");}
async function toggleRecord(){
if(isRecording){stopRecord();return;}
try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(stream,{mimeType:"audio/webm;codecs=opus"});
audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
mediaRecorder.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());await analyzeAudio(new Blob(audioChunks,{type:"audio/webm"}));};
mediaRecorder.start(100);isRecording=true;timeLeft=30;
document.getElementById("record-btn").classList.add("recording");
timerInterval=setInterval(()=>{timeLeft--;document.getElementById("timer").textContent="00:"+String(timeLeft).padStart(2,"0");if(timeLeft<=0)stopRecord();},1000);
}catch(e){alert("无法访问麦克风，请检查浏览器权限");}}
function stopRecord(){if(!isRecording)return;isRecording=false;clearInterval(timerInterval);
if(mediaRecorder&&mediaRecorder.state!=="inactive")mediaRecorder.stop();
document.getElementById("record-btn").classList.remove("recording");}
async function analyzeAudio(blob){
showPage("page-loading");
const fd=new FormData();fd.append("audio",blob,"recording.webm");
const headers=userId?{"X-User-Id":userId}:{};
try{const r=await fetch(API+"/analyze",{method:"POST",headers,body:fd});const d=await r.json();showReport(d);}
catch(e){showReport(generateDemo());}}

function generateDemo(){
return{report_id:"demo",timestamp:new Date().toISOString(),report:{
overall_risk_level:"轻微关注",overall_score:42.5,recording_quality:"良好",
feature_summary:{"基频":"142 Hz","Jitter":"0.0182","Shimmer":"0.0451","HNR":"14.3 dB","语速":"3.2/s","停顿比":"18.5%","RMS能量":"0.0312","时长":"30.0s"},
diseases:[
{disease:"焦虑状态",category:"心理健康",risk_score:45.2,risk_level:"中",key_markers:["语速偏快","音调偏高"],description:"焦虑时交感神经兴奋"},
{disease:"疲劳状态",category:"健康状态",risk_score:38.7,risk_level:"中",key_markers:["能量偏低","语速偏慢"],description:"身体疲劳"},
{disease:"心理压力",category:"心理健康",risk_score:32.1,risk_level:"低",key_markers:["音调升高"],description:"压力指标"},
],
recommendations:["💡 焦虑状态处于中等风险，建议关注压力管理。","💡 疲劳状态建议注意休息。","📌 此报告仅供参考，不构成医疗诊断。"],
},ai_insight:"您的语音分析显示整体健康状况良好。焦虑和疲劳指标略有升高，可能与近期生活压力有关。建议保持规律作息，适当运动放松。"};}
function showReport(data){
showPage("page-report");
const r=data.report;const d=new Date(data.timestamp||Date.now());
document.getElementById("report-time").textContent=d.toLocaleString("zh-CN");
const cls=r.overall_risk_level==="需关注"?"bad":(r.overall_risk_level==="轻微关注"?"warn":"good");
const color=cls==="bad"?"var(--red)":(cls==="warn"?"var(--yellow)":"var(--green)");
document.getElementById("report-summary").innerHTML=
'<div class="score-circle '+cls+'"><div class="num" style="color:'+color+'">'+r.overall_score+'</div><div class="label">健康评分</div></div>'+
'<p style="color:'+color+';font-weight:600">'+r.overall_risk_level+'</p><p class="text-xs">录音质量: '+r.recording_quality+'</p>';
let fh='';for(const[k,v]of Object.entries(r.feature_summary||{})){fh+='<div class="feat-item"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}
document.getElementById("feat-grid").innerHTML=fh;
document.getElementById("ai-insight").textContent=data.ai_insight||"分析完成";
const cats=[...new Set(r.diseases.map(d=>d.category))];
let th='<button class="tab active" onclick="filterD(this,'all')">全部</button>';
cats.forEach(c=>{th+='<button class="tab" onclick="filterD(this,''+c+'')">'+c+'</button>';});
document.getElementById("disease-tabs").innerHTML=th;
window._diseases=r.diseases;renderDiseases(r.diseases);
document.getElementById("rec-list").innerHTML=(r.recommendations||[]).map(r=>'<div class="rec-item">'+r+'</div>').join('');}

function renderDiseases(diseases){
document.getElementById("disease-list").innerHTML=diseases.map(d=>{
const cls=d.risk_level==="高"?"high":(d.risk_level==="中"?"mid":"low");
return '<div class="disease-card"><div style="display:flex;justify-content:space-between;align-items:center">'+
'<div><div class="disease-name">'+d.disease+'</div><div class="disease-cat">'+d.category+'</div></div>'+
'<div class="disease-score" style="color:var(--'+cls+')">'+d.risk_score+'</div></div>'+
'<div class="bar"><div class="bar-fill '+cls+'" style="width:'+d.risk_score+'%"></div></div>'+
'<div>'+d.key_markers.map(m=>'<span class="marker">'+m+'</span>').join('')+'</div></div>';}).join('');}

function filterD(btn,cat){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
btn.classList.add("active");
renderDiseases(cat==="all"?window._diseases:window._diseases.filter(d=>d.category===cat));}
async function loadRecent(){
if(!userId)return;try{const r=await fetch(API+"/records?limit=3",{headers:{"X-User-Id":userId}});const d=await r.json();
if(d.records&&d.records.length){document.getElementById("recent-list").innerHTML=d.records.map(r=>{
const cls=r.overall_level==="需关注"?"high":(r.overall_level==="轻微关注"?"mid":"low");
return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'+
'<span class="text-xs">'+(r.created_at||"").slice(0,10)+'</span>'+
'<span class="tag tag-'+cls+'">'+r.overall_score+"分 "+r.overall_level+"</span></div>";}).join("");}}catch(e){}}

async function loadHistory(){
if(!userId)return;try{const r=await fetch(API+"/records?limit=50",{headers:{"X-User-Id":userId}});const d=await r.json();
if(d.records&&d.records.length){document.getElementById("history-list").innerHTML='<div class="card">'+d.records.map(r=>{
const cls=r.overall_level==="需关注"?"high":(r.overall_level==="轻微关注"?"mid":"low");
return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">'+
'<div><p class="text-xs">'+(r.created_at||"").slice(0,16).replace("T"," ")+"</p></div>"+
'<span style="font-size:20px;font-weight:700;color:var(--'+cls+')">'+r.overall_score+'</span></div>';}).join("")+"</div>";
}else{document.getElementById("history-list").innerHTML='<div class="card text-center"><p class="text-sm">暂无检测记录</p></div>';}}catch(e){}}

async function loadProfile(){
if(!userId)return;try{const r=await fetch(API+"/user/profile",{headers:{"X-User-Id":userId}});const d=await r.json();
document.getElementById("profile-name").textContent=d.user?.nickname||"用户";
document.getElementById("profile-phone").textContent=d.user?.phone||"";
document.getElementById("stat-total").textContent=d.stats?.total_checks||0;
document.getElementById("stat-avg").textContent=d.stats?.avg_score||"-";
document.getElementById("stat-last").textContent=d.stats?.last_check?d.stats.last_check.slice(5,10):"-";}catch(e){}}

if(userId){document.getElementById("user-name").textContent=userName;showPage("page-home");loadRecent();}
else{showPage("page-login");}
</script></body></html>
