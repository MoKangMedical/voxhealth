<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxHealth 🔊 — 语音健康检测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e5e5e5; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
        .pulse-ring { animation: pulse-ring 1.5s cubic-bezier(0.215,0.61,0.355,1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        .recording-btn { animation: pulse-glow 1.5s ease-in-out infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 40px rgba(239,68,68,0.6); } }
        .risk-high { color: #ef4444; }
        .risk-medium { color: #f59e0b; }
        .risk-low { color: #22c55e; }
        .risk-bar { height: 6px; border-radius: 3px; background: #1a1a25; overflow: hidden; }
        .risk-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .waveform-canvas { width: 100%; height: 80px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-12">

        <!-- 头部 -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2">🔊 VoxHealth</h1>
            <p class="text-gray-500">30秒语音 · 25种疾病早筛 · 非侵入·低延迟</p>
        </header>

        <!-- 录音区 -->
        <div id="record-section" class="glass rounded-2xl p-8 text-center mb-8">
            <div id="waveform-container" class="mb-6">
                <canvas id="waveform" class="waveform-canvas rounded-lg bg-black/30"></canvas>
            </div>

            <div id="record-status" class="text-gray-500 text-sm mb-6">点击按钮开始录制30秒语音</div>
            <div id="timer" class="text-3xl font-mono text-gray-300 mb-6 hidden">00:30</div>

            <button id="record-btn" onclick="toggleRecording()" class="w-20 h-20 rounded-full bg-gray-700 hover:bg-gray-600 transition-all flex items-center justify-center mx-auto">
                <div id="record-icon" class="w-6 h-6 rounded-full bg-red-500"></div>
            </button>

            <p class="text-xs text-gray-600 mt-4">请自然说话，无需特殊准备。支持中文/英文/任何语言。</p>
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="hidden glass rounded-2xl p-12 text-center mb-8">
            <div class="text-4xl mb-4">🧠</div>
            <p class="text-gray-400">AI正在分析你的语音特征...</p>
            <div class="mt-4 flex justify-center gap-1">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style="animation-delay:0s"></span>
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style="animation-delay:0.1s"></span>
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style="animation-delay:0.2s"></span>
            </div>
        </div>

        <!-- 报告区 -->
        <div id="report-section" class="hidden">
            <!-- 总评 -->
            <div class="glass rounded-2xl p-6 mb-6 fade-in">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold">📊 健康评估总览</h2>
                    <span id="report-id" class="text-xs text-gray-600"></span>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-center">
                        <div id="overall-score" class="text-5xl font-bold text-green-400">--</div>
                        <div class="text-xs text-gray-500 mt-1">综合评分</div>
                    </div>
                    <div class="flex-1">
                        <div id="overall-level" class="text-lg font-semibold text-green-400 mb-1">--</div>
                        <div id="recording-quality" class="text-xs text-gray-500"></div>
                    </div>
                </div>
            </div>

            <!-- 声学特征 -->
            <div class="glass rounded-2xl p-6 mb-6 fade-in">
                <h3 class="text-sm font-semibold text-gray-400 mb-4">🎙️ 关键声学特征</h3>
                <div id="feature-grid" class="grid grid-cols-2 gap-3 text-sm"></div>
            </div>

            <!-- 疾病风险 -->
            <div class="glass rounded-2xl p-6 mb-6 fade-in">
                <h3 class="text-sm font-semibold text-gray-400 mb-4">🏥 疾病风险筛查</h3>
                <div id="disease-tabs" class="flex gap-2 mb-4 flex-wrap"></div>
                <div id="disease-list" class="space-y-3"></div>
            </div>

            <!-- 建议 -->
            <div class="glass rounded-2xl p-6 mb-6 fade-in">
                <h3 class="text-sm font-semibold text-gray-400 mb-4">💡 建议</h3>
                <div id="recommendations" class="space-y-2 text-sm text-gray-300"></div>
            </div>

            <div class="text-center">
                <button onclick="resetAll()" class="text-xs text-gray-600 hover:text-gray-400 transition">🔄 重新检测</button>
            </div>
        </div>

        <footer class="text-center mt-12 text-xs text-gray-700">
            VoxHealth v0.1 · 仅供参考，不构成医疗诊断 · 音频分析后即删
        </footer>
    </div>

<script>
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let timerInterval = null;
    let timeLeft = 30;
    let audioContext = null;
    let analyser = null;
    let animFrame = null;

    async function toggleRecording() {
        if (isRecording) {
            stopRecording();
        } else {
            await startRecording();
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
            audioChunks = [];

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                stream.getTracks().forEach(t => t.stop());
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                await analyzeAudio(blob);
            };

            mediaRecorder.start(100);
            isRecording = true;
            timeLeft = 30;

            // UI更新
            document.getElementById('record-icon').classList.remove('bg-red-500');
            document.getElementById('record-icon').classList.add('bg-white');
            document.getElementById('record-btn').classList.add('recording-btn');
            document.getElementById('record-status').textContent = '正在录制... 请自然说话';
            document.getElementById('timer').classList.remove('hidden');

            // 波形可视化
            setupVisualizer(stream);

            // 倒计时
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `00:${String(timeLeft).padStart(2, '0')}`;
                if (timeLeft <= 0) stopRecording();
            }, 1000);

        } catch(err) {
            alert('无法访问麦克风。请检查浏览器权限设置。');
        }
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;
        clearInterval(timerInterval);
        cancelAnimationFrame(animFrame);

        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();

        document.getElementById('record-icon').classList.add('bg-red-500');
        document.getElementById('record-icon').classList.remove('bg-white');
        document.getElementById('record-btn').classList.remove('recording-btn');
        document.getElementById('record-status').textContent = '分析中...';
        document.getElementById('timer').classList.add('hidden');
    }

    function setupVisualizer(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);

        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2;
        canvas.height = canvas.offsetHeight * 2;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
            if (!isRecording) return;
            animFrame = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = 'rgba(10,10,15,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = canvas.width / bufferLength * 2;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height;
                const hue = 200 + (dataArray[i] / 255) * 60;
                ctx.fillStyle = `hsla(${hue}, 70%, 50%, 0.7)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                x += barWidth;
            }
        }
        draw();
    }

    async function analyzeAudio(blob) {
        document.getElementById('record-section').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');

        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');

        try {
            const resp = await fetch('/api/analyze', { method: 'POST', body: formData });
            const data = await resp.json();
            displayReport(data);
        } catch(e) {
            // 离线Demo模式
            displayReport(generateDemoReport());
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('report-section').classList.remove('hidden');
    }

    function generateDemoReport() {
        return {
            report_id: 'demo-' + Math.random().toString(36).slice(2,8),
            timestamp: new Date().toISOString(),
            report: {
                overall_risk_level: '轻微关注',
                overall_score: 42.5,
                recording_quality: '良好',
                feature_summary: { '基频':'142 Hz (变异38.2)', 'Jitter':'0.0182', 'Shimmer':'0.0451', 'HNR':'14.3 dB', '语速':'3.2 音节/秒', '停顿比':'18.5%', 'RMS能量':'0.0312' },
                diseases: [
                    { disease:'焦虑状态', category:'心理健康', risk_score:45.2, confidence:0.62, risk_level:'中', key_markers:['语速偏快','音调偏高','Jitter增大'], description:'焦虑时交感神经兴奋导致的声音变化' },
                    { disease:'疲劳状态', category:'健康状态', risk_score:38.7, confidence:0.55, risk_level:'中', key_markers:['能量偏低','语速偏慢'], description:'身体疲劳对语音的影响' },
                    { disease:'心理压力', category:'心理健康', risk_score:32.1, confidence:0.48, risk_level:'低', key_markers:['音调升高','HNR下降'], description:'压力水平的语音指标' },
                    { disease:'帕金森病早期', category:'认知退行', risk_score:12.5, confidence:0.35, risk_level:'低', key_markers:['未检测到明显异常'], description:'帕金森影响发声肌群' },
                    { disease:'抑郁风险', category:'心理健康', risk_score:8.3, confidence:0.30, risk_level:'低', key_markers:['未检测到明显异常'], description:'语音中的情绪低落信号' },
                ],
                recommendations: ['💡 【焦虑状态】处于中等风险，建议关注压力管理。','💡 【疲劳状态】建议注意休息，保证充足睡眠。','📌 此报告仅供参考，不构成医疗诊断。'],
            }
        };
    }

    function displayReport(data) {
        const r = data.report;
        document.getElementById('report-id').textContent = data.report_id;

        // 总评
        const scoreEl = document.getElementById('overall-score');
        const levelEl = document.getElementById('overall-level');
        scoreEl.textContent = r.overall_score;
        if (r.overall_risk_level === '需关注') { scoreEl.className = 'text-5xl font-bold text-red-400'; levelEl.className = 'text-lg font-semibold text-red-400 mb-1'; }
        else if (r.overall_risk_level === '轻微关注') { scoreEl.className = 'text-5xl font-bold text-yellow-400'; levelEl.className = 'text-lg font-semibold text-yellow-400 mb-1'; }
        levelEl.textContent = r.overall_risk_level;
        document.getElementById('recording-quality').textContent = '录音质量：' + r.recording_quality;

        // 声学特征
        const grid = document.getElementById('feature-grid');
        grid.innerHTML = '';
        for (const [k,v] of Object.entries(r.feature_summary || {})) {
            grid.innerHTML += `<div class="bg-black/30 rounded-lg p-3"><div class="text-xs text-gray-500">${k}</div><div class="text-sm text-white font-mono">${v}</div></div>`;
        }

        // 疾病分类标签
        const categories = [...new Set(r.diseases.map(d => d.category))];
        const tabs = document.getElementById('disease-tabs');
        tabs.innerHTML = `<button onclick="filterDiseases('all')" class="px-3 py-1 rounded-full text-xs bg-white/10 text-white tab-active">全部</button>`;
        categories.forEach(c => {
            tabs.innerHTML += `<button onclick="filterDiseases('${c}')" class="px-3 py-1 rounded-full text-xs bg-white/5 text-gray-400 hover:bg-white/10">${c}</button>`;
        });

        // 疾病列表
        displayDiseases(r.diseases);

        // 建议
        const rec = document.getElementById('recommendations');
        rec.innerHTML = r.recommendations.map(r => `<p>${r}</p>`).join('');
    }

    function displayDiseases(diseases) {
        const list = document.getElementById('disease-list');
        list.innerHTML = diseases.map(d => {
            const riskClass = d.risk_level === '高' ? 'risk-high' : (d.risk_level === '中' ? 'risk-medium' : 'risk-low');
            const barColor = d.risk_level === '高' ? 'bg-red-500' : (d.risk_level === '中' ? 'bg-yellow-500' : 'bg-green-500');
            return `
                <div class="bg-black/20 rounded-xl p-4">
                    <div class="flex items-center justify-between mb-2">
                        <div>
                            <span class="font-medium text-white">${d.disease}</span>
                            <span class="text-xs text-gray-600 ml-2">${d.category}</span>
                        </div>
                        <span class="${riskClass} font-bold text-lg">${d.risk_score}</span>
                    </div>
                    <div class="risk-bar mb-2"><div class="risk-fill ${barColor}" style="width:${d.risk_score}%"></div></div>
                    <div class="flex flex-wrap gap-1 mb-1">
                        ${d.key_markers.map(m => `<span class="text-xs px-2 py-0.5 rounded-full bg-white/5 text-gray-400">${m}</span>`).join('')}
                    </div>
                    <p class="text-xs text-gray-600">${d.description}</p>
                </div>`;
        }).join('');
    }

    let allDiseases = [];
    function filterDiseases(cat) {
        const report = document.getElementById('disease-list').innerHTML;
        // 简单过滤
        document.querySelectorAll('.tab-active').forEach(el => el.classList.remove('tab-active'));
        event.target.classList.add('tab-active');
    }

    function resetAll() {
        document.getElementById('report-section').classList.add('hidden');
        document.getElementById('record-section').classList.remove('hidden');
        document.getElementById('record-status').textContent = '点击按钮开始录制30秒语音';
    }
</script>
</body>
</html>
